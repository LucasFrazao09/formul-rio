<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Cães</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <h1>Adote uma VIDA!</h1>
    </header>

    <h2>Faça o Cadastro</h2>

    <div><label for="ncomp">Nome completo:</label><br>
        <input type="text" id="nome" required>
    </div>
    <div><label for="email">Email:</label><br>
        <input type="text" id="email" required>
    </div>
    <div><label for="tel">Telefone:</label><br>
        <input type="text" id="tel" required>
        <div><label for="cpf">CPF:</label><br>
            <input type="text" id="cpf" required>
        </div>
        <div><label for="idade">Idade:</label><br>
            <input type="text" id="idade" required>
        </div>
        <div> <label for="cidade">Cidade em que reside:</label><br>
            <input type="text" id="cidade" required>
        </div>
        <div><label for="casa">Tipo de moradia</label><br>
            <select name="" id="tipo">
                <option value="casa">Casa</option>
                <option value="apt">Apto</option>
            </select>
        </div>
        <div><label for="quintal">Possui quintal?</label><br>
            <select name="" id="quintal">
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>
        <div><label for="pets">Já teve pets antes?</label><br>
            <select name="" id="pets_anteriores">
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>
          <div>
            <label for="financeiro">Possui condições financeiras para cuidar do pet?</label> <br>
            <select name="" id="">
                <option value="sim" required> Sim </option>
                <option value="nao"> Não </option>
            </select>
        </div>
        <div><label for="hrs">Qantas horas o animal ficará sozinho por dia?</label><br>
            <input type="text" id="sozinho" required>
        </div>
        <div><label for="msg">Qual o motivo da adoção?</label><br>
            <textarea name="msgem" id="msgem" rows="10" cols="30" placeholder="Abra seu coração!"></textarea>
        </div>
        <div> <label for="aceitar">Aceite o termo de responsabiidade</label><br>
            <input type="checkbox" name="aceitar" id="">
        </div>








        <script src="scripts/script.js"></script>

</body>

</html>
